<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON ARENA</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Audiowide&family=Chakra+Petch:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ── Background Grid ── */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            animation: gridPulse 4s ease-in-out infinite;
        }

        @keyframes gridPulse {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        .glow-line {
            position: fixed;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            opacity: 0.3;
            z-index: 0;
            animation: scanLine 8s linear infinite;
        }

        .glow-line:nth-child(2) {
            top: 20%;
            width: 100%;
            animation-duration: 6s;
        }

        .glow-line:nth-child(3) {
            top: 50%;
            width: 100%;
            animation-duration: 10s;
            animation-delay: 2s;
        }

        .glow-line:nth-child(4) {
            top: 80%;
            width: 100%;
            animation-duration: 7s;
            animation-delay: 4s;
        }

        @keyframes scanLine {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        /* ── Menu ── */
        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .title {
            font-family: 'Audiowide', sans-serif;
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 12px;
            background: linear-gradient(135deg, #00ffff, #0088ff, #00ffff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 3s ease-in-out infinite;
            margin-bottom: 8px;
        }

        @keyframes titleGlow {

            0%,
            100% {
                background-position: 0% 50%;
                filter: brightness(1);
            }

            50% {
                background-position: 100% 50%;
                filter: brightness(1.3);
            }
        }

        .subtitle {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 14px;
            letter-spacing: 8px;
            color: rgba(0, 255, 255, 0.5);
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        /* ── Inputs ── */
        input {
            width: 320px;
            padding: 14px 24px;
            margin: 8px;
            font-size: 18px;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 400;
            letter-spacing: 3px;
            text-align: center;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.25);
            color: #00ffff;
            outline: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        input::placeholder {
            color: rgba(0, 255, 255, 0.3);
            letter-spacing: 4px;
        }

        input:focus {
            border-color: #00ffff;
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.15), inset 0 0 25px rgba(0, 255, 255, 0.05);
        }

        /* ── Buttons ── */
        .btn {
            display: inline-block;
            padding: 14px 36px;
            margin: 10px 8px;
            font-size: 16px;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            background: transparent;
            border: 1px solid rgba(0, 255, 255, 0.4);
            color: #00ffff;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.15), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover {
            border-color: #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2), inset 0 0 30px rgba(0, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: rgba(0, 255, 255, 0.1);
            border-color: #00ffff;
        }

        /* ── Sections ── */
        #joinArea {
            display: none;
            margin-top: 20px;
        }

        #lobby {
            display: none;
            margin-top: 30px;
        }

        .room-code {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 28px;
            letter-spacing: 6px;
            color: #00ffff;
            margin: 10px 0;
        }

        .room-label {
            font-size: 13px;
            letter-spacing: 5px;
            color: rgba(0, 255, 255, 0.4);
            text-transform: uppercase;
        }

        .player-list {
            margin: 20px 0;
            padding: 0;
            list-style: none;
        }

        .player-list li {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            padding: 8px 20px;
            margin: 6px 0;
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid;
            display: inline-block;
        }

        .waiting-text {
            font-size: 13px;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.3);
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* ── Error Toast ── */
        .error-toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(255, 46, 99, 0.15);
            border: 1px solid rgba(255, 46, 99, 0.5);
            color: #ff2e63;
            padding: 14px 32px;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            z-index: 100;
            transition: transform 0.4s ease;
        }

        .error-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ── Game Area ── */
        #gameArea {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.08);
        }

        /* ── Scoreboard ── */
        #scoreBoard {
            position: absolute;
            top: 20px;
            right: 30px;
            text-align: right;
            z-index: 20;
            font-family: 'Chakra Petch', sans-serif;
        }

        .score-entry {
            font-size: 14px;
            letter-spacing: 2px;
            padding: 6px 0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
        }

        .score-name {
            opacity: 0.7;
        }

        .score-value {
            font-weight: 700;
            font-size: 18px;
            min-width: 20px;
        }

        .score-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .score-you {
            opacity: 1 !important;
        }

        /* ── Countdown ── */
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Chakra Petch', sans-serif;
            font-size: 120px;
            font-weight: 900;
            color: #00ffff;
            z-index: 30;
            text-shadow: 0 0 80px rgba(0, 255, 255, 0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        #countdown.visible {
            opacity: 1;
            animation: countPop 0.5s ease-out;
        }

        @keyframes countPop {
            0% {
                transform: translate(-50%, -50%) scale(2);
                opacity: 0;
            }

            50% {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        /* ── Winner Overlay ── */
        #winnerOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            z-index: 40;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #winnerOverlay.show {
            display: flex;
        }

        .winner-text {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 20px;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .winner-name {
            font-family: 'Audiowide', sans-serif;
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ffff, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
            animation: winnerGlow 2s ease-in-out infinite;
        }

        @keyframes winnerGlow {

            0%,
            100% {
                filter: brightness(1);
            }

            50% {
                filter: brightness(1.5);
            }
        }

        /* ── HUD Corners ── */
        .hud-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: rgba(0, 255, 255, 0.3);
            border-style: solid;
            z-index: 15;
        }

        .hud-tl {
            top: 10px;
            left: 10px;
            border-width: 2px 0 0 2px;
        }

        .hud-tr {
            top: 10px;
            right: 10px;
            border-width: 2px 2px 0 0;
        }

        .hud-bl {
            bottom: 10px;
            left: 10px;
            border-width: 0 0 2px 2px;
        }

        .hud-br {
            bottom: 10px;
            right: 10px;
            border-width: 0 2px 2px 0;
        }

        /* ── Round Info ── */
        #roundInfo {
            position: absolute;
            top: 20px;
            left: 30px;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 11px;
            letter-spacing: 3px;
            color: rgba(0, 255, 255, 0.4);
            z-index: 20;
            text-transform: uppercase;
        }

        /* ── Controls Help ── */
        #controlsHelp {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Chakra Petch', sans-serif;
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(0, 255, 255, 0.25);
            z-index: 20;
            text-transform: uppercase;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
            margin: 20px auto;
        }

        /* ── Speed HUD ── */
        #speedHud {
            position: absolute;
            bottom: 20px;
            left: 30px;
            font-family: 'Chakra Petch', sans-serif;
            z-index: 20;
            display: none;
        }

        .speed-label {
            font-size: 9px;
            letter-spacing: 3px;
            color: rgba(0, 255, 255, 0.35);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .speed-value {
            font-size: 22px;
            font-weight: 700;
            color: #00ffff;
            letter-spacing: 2px;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .speed-value.fast {
            color: #ffaa00;
            text-shadow: 0 0 20px rgba(255, 170, 0, 0.5);
        }

        .speed-value.danger {
            color: #ff2e63;
            text-shadow: 0 0 30px rgba(255, 46, 99, 0.6);
            animation: speedPulse 0.6s ease-in-out infinite;
        }

        @keyframes speedPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .timer-value {
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(0, 255, 255, 0.3);
            margin-top: 6px;
        }

        /* ── Speed Bar ── */
        .speed-bar-bg {
            width: 120px;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }

        .speed-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #ffaa00, #ff2e63);
            border-radius: 2px;
            transition: width 0.4s ease;
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="glow-line"></div>
    <div class="glow-line"></div>
    <div class="glow-line"></div>

    <div id="errorToast" class="error-toast"></div>

    <!-- Menu -->
    <div id="menu">
        <h1 class="title">TRON</h1>
        <p class="subtitle">Light Cycle Arena</p>

        <input id="playerName" placeholder="ENTER CALLSIGN" maxlength="12" />
        <br>

        <div style="margin-top: 10px;">
            <button class="btn btn-primary" id="hostBtn">HOST GAME</button>
            <button class="btn" id="openJoin">JOIN GAME</button>
        </div>

        <div id="joinArea">
            <div class="divider"></div>
            <input id="joinCode" placeholder="ROOM CODE" maxlength="4" />
            <br>
            <button class="btn btn-primary" id="joinBtn">ENTER ARENA</button>
        </div>

        <div id="lobby">
            <div class="divider"></div>
            <p class="room-label">Room Code</p>
            <h2 class="room-code" id="roomCode"></h2>
            <ul class="player-list" id="playerList"></ul>
            <p class="waiting-text" id="waitingText">WAITING FOR PLAYERS...</p>
            <button class="btn btn-primary" id="startGame">LAUNCH MATCH</button>
        </div>
    </div>

    <!-- Game Area -->
    <div id="gameArea">
        <div class="hud-corner hud-tl"></div>
        <div class="hud-corner hud-tr"></div>
        <div class="hud-corner hud-bl"></div>
        <div class="hud-corner hud-br"></div>

        <div id="roundInfo">FIRST TO 3 · STEER TO SURVIVE</div>
        <div id="scoreBoard"></div>
        <div id="countdown"></div>
        <div id="controlsHelp">← LEFT &nbsp;&nbsp;|&nbsp;&nbsp; RIGHT →&nbsp;&nbsp;&nbsp;or&nbsp;&nbsp;&nbsp; A
            &nbsp;&nbsp;|&nbsp;&nbsp; D</div>

        <canvas id="game" width="1400" height="900"></canvas>

        <div id="speedHud">
            <div class="speed-label">SPEED</div>
            <div class="speed-value" id="speedValue">2.5x</div>
            <div class="speed-bar-bg">
                <div class="speed-bar-fill" id="speedBar" style="width: 31%"></div>
            </div>
            <div class="timer-value" id="timerValue">00:00</div>
        </div>

        <div id="winnerOverlay">
            <p class="winner-text">Match Winner</p>
            <p class="winner-name" id="winnerName"></p>
        </div>
    </div>

    <script>
        // ── ELEMENTS ──
        const nameInput = document.getElementById("playerName");
        const hostBtn = document.getElementById("hostBtn");
        const openJoin = document.getElementById("openJoin");
        const joinArea = document.getElementById("joinArea");
        const joinBtn = document.getElementById("joinBtn");
        const lobby = document.getElementById("lobby");
        const startBtn = document.getElementById("startGame");
        const roomCodeText = document.getElementById("roomCode");
        const scoreBoard = document.getElementById("scoreBoard");
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const menuEl = document.getElementById("menu");
        const gameArea = document.getElementById("gameArea");
        const countdownEl = document.getElementById("countdown");
        const winnerOverlay = document.getElementById("winnerOverlay");
        const winnerNameEl = document.getElementById("winnerName");
        const playerListEl = document.getElementById("playerList");
        const waitingText = document.getElementById("waitingText");
        const errorToast = document.getElementById("errorToast");
        const controlsHelp = document.getElementById("controlsHelp");
        const speedHud = document.getElementById("speedHud");
        const speedValueEl = document.getElementById("speedValue");
        const speedBar = document.getElementById("speedBar");
        const timerValueEl = document.getElementById("timerValue");

        let ws;
        let myId = null;
        let players = {};
        let isGameActive = false;
        let lastCountdown = -1;
        let currentWinner = null;

        // Track which keys are held down
        const keysDown = new Set();

        // ── CONNECT ──
        function connect() {
            const protocol = location.protocol === "https:" ? "wss:" : "ws:";
            ws = new WebSocket(protocol + "//" + location.host);

            ws.onopen = () => console.log("Connected to server");
            ws.onclose = () => { console.log("Disconnected"); setTimeout(connect, 2000); };
            ws.onerror = (e) => console.error("WS error:", e);
            ws.onmessage = handleMessage;
        }

        connect();

        // ── ERROR ──
        function showError(msg) {
            errorToast.textContent = msg;
            errorToast.classList.add("show");
            setTimeout(() => errorToast.classList.remove("show"), 3000);
        }

        // ── MESSAGE HANDLER ──
        function handleMessage(event) {
            const data = JSON.parse(event.data);

            if (data.type === "init") myId = data.id;

            if (data.type === "error") showError(data.message);

            if (data.type === "roomCreated") {
                lobby.style.display = "block";
                roomCodeText.textContent = data.code;
            }

            if (data.type === "joined") {
                lobby.style.display = "block";
                roomCodeText.textContent = data.code;
                startBtn.style.display = "none";
                waitingText.textContent = "WAITING FOR HOST TO START...";
            }

            if (data.type === "playerList") updatePlayerList(data.players);

            if (data.type === "gameStart") {
                menuEl.style.display = "none";
                gameArea.style.display = "block";
                isGameActive = true;
                speedHud.style.display = "block";
                // Fade out controls help after 8 seconds
                setTimeout(() => { controlsHelp.style.opacity = "0"; }, 8000);
            }

            if (data.type === "state") {
                players = data.players;
                updateScore();

                // Countdown
                if (data.center && data.countdown > 0) {
                    if (data.countdown !== lastCountdown) {
                        lastCountdown = data.countdown;
                        countdownEl.textContent = data.countdown;
                        countdownEl.classList.remove("visible");
                        void countdownEl.offsetWidth;
                        countdownEl.classList.add("visible");
                    }
                } else if (data.center && data.countdown === 0) {
                    countdownEl.textContent = "GO!";
                    countdownEl.classList.add("visible");
                    setTimeout(() => {
                        countdownEl.classList.remove("visible");
                        lastCountdown = -1;
                    }, 600);
                } else {
                    countdownEl.classList.remove("visible");
                }

                // Winner
                if (data.winner && data.winner !== currentWinner) {
                    currentWinner = data.winner;
                    winnerNameEl.textContent = data.winner;
                    winnerOverlay.classList.add("show");
                    setTimeout(() => {
                        winnerOverlay.classList.remove("show");
                        currentWinner = null;
                    }, 3500);
                }

                // Speed + Timer HUD
                if (data.speed !== undefined) {
                    const spd = data.speed;
                    speedValueEl.textContent = spd.toFixed(1) + 'x';
                    // Color coding based on speed
                    speedValueEl.className = 'speed-value';
                    if (spd >= 6) speedValueEl.classList.add('danger');
                    else if (spd >= 4) speedValueEl.classList.add('fast');
                    // Bar fill (2.5 to 8 range)
                    const pct = Math.min(((spd - 2.5) / (8 - 2.5)) * 100, 100);
                    speedBar.style.width = pct + '%';
                }
                if (data.elapsed !== undefined) {
                    const mins = Math.floor(data.elapsed / 60).toString().padStart(2, '0');
                    const secs = (data.elapsed % 60).toString().padStart(2, '0');
                    timerValueEl.textContent = mins + ':' + secs;
                }
            }
        }

        // ── PLAYER LIST ──
        function updatePlayerList(info) {
            playerListEl.innerHTML = "";
            for (let id in info) {
                const li = document.createElement("li");
                li.textContent = info[id].name;
                li.style.borderLeftColor = info[id].color;
                li.style.color = info[id].color;
                if (id === myId) li.textContent += " (YOU)";
                playerListEl.appendChild(li);
            }
        }

        // ── UI ACTIONS ──
        openJoin.onclick = () => {
            joinArea.style.display = joinArea.style.display === "block" ? "none" : "block";
        };

        hostBtn.onclick = () => {
            const name = nameInput.value.trim();
            if (!name) { showError("ENTER YOUR CALLSIGN"); nameInput.focus(); return; }
            ws.send(JSON.stringify({ type: "create", name }));
        };

        joinBtn.onclick = () => {
            const name = nameInput.value.trim();
            if (!name) { showError("ENTER YOUR CALLSIGN"); nameInput.focus(); return; }
            const code = document.getElementById("joinCode").value.trim();
            if (!code) { showError("ENTER ROOM CODE"); return; }
            ws.send(JSON.stringify({ type: "join", code, name }));
        };

        startBtn.onclick = () => {
            ws.send(JSON.stringify({ type: "start" }));
        };

        // ── CONTROLS: Left/Right Steering ──
        // The player always moves forward. Left/Right keys steer.
        // We send turn direction: -1 (left), 0 (straight), 1 (right)

        function updateTurnDirection() {
            if (!isGameActive) return;

            const left = keysDown.has("ArrowLeft") || keysDown.has("a") || keysDown.has("A");
            const right = keysDown.has("ArrowRight") || keysDown.has("d") || keysDown.has("D");

            let dir = 0;
            if (left && !right) dir = -1;
            if (right && !left) dir = 1;

            ws.send(JSON.stringify({ type: "turn", dir }));
        }

        document.addEventListener("keydown", (e) => {
            if (!isGameActive) return;
            const key = e.key;
            if (["ArrowLeft", "ArrowRight", "a", "A", "d", "D"].includes(key)) {
                e.preventDefault();
                if (!keysDown.has(key)) {
                    keysDown.add(key);
                    updateTurnDirection();
                }
            }
        });

        document.addEventListener("keyup", (e) => {
            if (!isGameActive) return;
            const key = e.key;
            if (keysDown.has(key)) {
                keysDown.delete(key);
                updateTurnDirection();
            }
        });

        // ── SCOREBOARD ──
        function updateScore() {
            let html = "";
            for (let id in players) {
                const p = players[id];
                const isMe = id === myId;
                html += `
          <div class="score-entry ${isMe ? "score-you" : ""}">
            <span class="score-name" style="color:${p.color}">${isMe ? "YOU" : p.name}</span>
            <span class="score-value" style="color:${p.color}">${p.score}</span>
            <span class="score-dot" style="background:${p.color};${p.alive ? "" : "opacity:0.2"}"></span>
          </div>`;
            }
            scoreBoard.innerHTML = html;
        }

        // ── GRID ──
        function drawGrid() {
            ctx.strokeStyle = "rgba(0, 255, 255, 0.04)";
            ctx.lineWidth = 0.5;
            for (let x = 0; x < 1400; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, 900);
                ctx.stroke();
            }
            for (let y = 0; y < 900; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(1400, y);
                ctx.stroke();
            }
        }

        // ── DRAW ──
        function draw() {
            // Dark fade for glow persistence
            ctx.fillStyle = "rgba(10, 10, 15, 0.92)";
            ctx.fillRect(0, 0, 1400, 900);

            drawGrid();

            for (let id in players) {
                const p = players[id];

                // Trail — smooth curve
                if (p.trail && p.trail.length > 1) {
                    // Outer glow
                    ctx.save();
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = p.color;
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 3;
                    ctx.globalAlpha = p.alive ? 0.6 : 0.12;
                    ctx.lineCap = "round";
                    ctx.lineJoin = "round";

                    ctx.beginPath();
                    ctx.moveTo(p.trail[0].x, p.trail[0].y);
                    for (let i = 1; i < p.trail.length; i++) {
                        ctx.lineTo(p.trail[i].x, p.trail[i].y);
                    }
                    ctx.stroke();

                    // Bright core
                    ctx.shadowBlur = 0;
                    ctx.lineWidth = 1.5;
                    ctx.globalAlpha = p.alive ? 0.9 : 0.15;
                    ctx.strokeStyle = "#ffffff";

                    ctx.beginPath();
                    ctx.moveTo(p.trail[0].x, p.trail[0].y);
                    for (let i = 1; i < p.trail.length; i++) {
                        ctx.lineTo(p.trail[i].x, p.trail[i].y);
                    }
                    ctx.stroke();

                    ctx.restore();
                }

                // Player head
                if (p.alive) {
                    ctx.save();

                    // Head glow
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = p.color;

                    // Direction indicator (small triangle)
                    const angle = p.angle || 0;
                    const hx = p.x;
                    const hy = p.y;
                    const size = 7;

                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.moveTo(
                        hx + Math.cos(angle) * size,
                        hy + Math.sin(angle) * size
                    );
                    ctx.lineTo(
                        hx + Math.cos(angle + 2.4) * size * 0.6,
                        hy + Math.sin(angle + 2.4) * size * 0.6
                    );
                    ctx.lineTo(
                        hx + Math.cos(angle - 2.4) * size * 0.6,
                        hy + Math.sin(angle - 2.4) * size * 0.6
                    );
                    ctx.closePath();
                    ctx.fill();

                    // Bright center dot
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "#fff";
                    ctx.beginPath();
                    ctx.arc(hx, hy, 2, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();

                    // Name
                    ctx.save();
                    ctx.fillStyle = p.color;
                    ctx.font = "bold 11px 'Chakra Petch', sans-serif";
                    ctx.textAlign = "center";
                    ctx.fillText(id === myId ? "YOU" : p.name, hx, hy - 16);
                    ctx.restore();

                } else {
                    // Death marker
                    ctx.save();
                    ctx.globalAlpha = 0.4;

                    // X mark
                    const dx = p.x;
                    const dy = p.y;
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(dx - 5, dy - 5);
                    ctx.lineTo(dx + 5, dy + 5);
                    ctx.moveTo(dx + 5, dy - 5);
                    ctx.lineTo(dx - 5, dy + 5);
                    ctx.stroke();

                    ctx.restore();
                }
            }

            // Border
            ctx.strokeStyle = "rgba(0, 255, 255, 0.15)";
            ctx.lineWidth = 1;
            ctx.strokeRect(0, 0, 1400, 900);

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
