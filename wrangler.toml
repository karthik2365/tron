name = "tron-arena"
main = "src/worker.js"
compatibility_date = "2024-12-01"

[assets]
directory = "./public"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"
run_worker_first = true

[durable_objects]
bindings = [
  { name = "GAME_SERVER", class_name = "GameServer" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameServer"]